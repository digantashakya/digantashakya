<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Image</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial, sans-serif;
  background:#111;
}

/* Navigation */
header{
  width:100%;
  padding:20px 50px;
  background:#000;
  position:fixed;
  top:0;
  left:0;
}

.nav-links{
  list-style:none;
  display:flex;
  gap:30px;
  justify-content:flex-end;
}

.nav-links a{
  text-decoration:none;
  color:white;
  font-size:16px;
}

/* Image Section */
.image-section{
  width:100%;
  margin-top:80px;
}

.image-section img{
  width:100%;
  height:auto;
  display:block;
}

</style>
</head>

<body>

<header>
<nav>
<ul class="nav-links">
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Portfolio</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>
</header>

<section class="image-section">
<img src="lamo page.png" alt="Website Long Image">
</section>

</body>
</html>
